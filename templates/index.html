<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>價值迭代可視化 - Grid World</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>價值迭代算法推導最佳政策</h1>
            <p>使用價值迭代 (Value Iteration) 計算每個格子的期望回報 $V(s)$ 與最佳行動箭頭。</p>
        </header>

        <div class="main-content">
            <div class="control-panel">
                <div class="mode-selection">
                    <h3>點擊網格設定</h3>
                    <div class="btn-group">
                        <button class="mode-btn active" data-type="block">設置障礙物</button>
                        <button class="mode-btn" data-type="start">設置起始點</button>
                        <button class="mode-btn" data-type="end">設置終點</button>
                        <button class="mode-btn" data-type="none">清除</button>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="iterate-btn" class="primary-btn">執行一次迭代</button>
                    <button id="auto-btn" class="secondary-btn">自動執行至收斂</button>
                    <button id="reset-btn" class="danger-btn">重置數值</button>
                </div>

                <div class="stats">
                    <div class="stat-item">迭代次數: <span id="iter-count">0</span></div>
                </div>
            </div>

            <div class="grid-container">
                <div id="grid" class="grid"></div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span class="box start"></span> 起點 (S)</div>
            <div class="legend-item"><span class="box end"></span> 終點 (G)</div>
            <div class="legend-item"><span class="box block"></span> 障礙物</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
